[index]
dir = "${INDEX_DIR}"
paths = []
exclude_patterns = ["dist/", "build/", ".next/", "out/"]

[graph]
exclude_modules = []
include_modules = []

[search]
metric = "cosine"
hybrid = true

[search.boosting]
penalties = [
  { pattern = "(^|/)tests?/", factor = 0.5 },
  { pattern = "(^|/)test_[^/]+\\.py$", factor = 0.5 },
  { pattern = "(^|/)(mock|fixture|conftest)", factor = 0.4 },
]
bonuses = [{ pattern = "(^|/)src/", factor = 1.1 }]

[embedder]
backend = "auto"

[embedder.fastembed]
model_name = "BAAI/bge-small-en-v1.5"
dimensions = 384
batch_size = 64

[embedder.mlx]
model_name = "mlx-community/bge-small-en-v1.5-bf16"
dimensions = 384
batch_size = 256

[watcher]
debounce = 2
exclude_patterns = []

